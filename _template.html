<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Labyrinth Map — Spirit Vale</title>
<style>
  :root{
    --bg0:#0a1613; --bg1:#0f221c; --bg2:#13291f;
    --ink:#e8f1ec; --muted:#8fa89d; --line:rgba(120,200,170,.16);
    --panel:rgba(18,34,28,.72); --glass:rgba(22,40,33,.55);
    --gold:#f4c95d; --portal:#c77dff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    color:var(--ink);height:100vh;overflow:hidden;
    background:
      radial-gradient(1200px 800px at 15% -10%, #1b3a2d 0%, transparent 55%),
      radial-gradient(1000px 700px at 100% 110%, #10302c 0%, transparent 50%),
      linear-gradient(160deg,var(--bg0),var(--bg1) 60%,var(--bg2));
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--gold)}
  .app{height:100vh;display:flex;flex-direction:column}

  /* ---- compact header ---- */
  header{
    flex:none;display:flex;align-items:center;gap:12px;padding:8px 14px;
  }
  header h1{
    margin:0;font-size:17px;letter-spacing:.4px;font-weight:700;white-space:nowrap;
    background:linear-gradient(90deg,#eaffe9,#a7e8c9 60%,#7bd0a8);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  header .sub{color:var(--muted);font-size:11px;white-space:nowrap}
  header .spacer{flex:1}
  header .stat{font-size:11px;color:var(--muted)}
  header .stat b{color:var(--ink);font-size:13px}

  /* ---- main split ---- */
  .main{flex:1;display:grid;grid-template-columns:1fr 280px;gap:10px;min-height:0;padding:0 12px 12px}

  .mapzone{
    position:relative;overflow:hidden;border:1px solid var(--line);border-radius:16px;
    background:
      radial-gradient(circle at 1px 1px, rgba(140,220,180,.09) 1px, transparent 0) 0 0/24px 24px,
      linear-gradient(180deg, rgba(8,20,16,.5), rgba(8,20,16,.2));
  }
  #stage{position:absolute;left:50%;top:50%;transform-origin:center center}
  svg.edges{position:absolute;inset:0;pointer-events:none;overflow:visible}
  .edge{stroke:rgba(150,210,185,.28);stroke-width:3;fill:none;stroke-linecap:round;transition:stroke .2s,stroke-width .2s,opacity .2s}
  .edge.exit{stroke-dasharray:2 9;stroke:rgba(199,125,255,.4)}
  .edge.dim{opacity:.1}
  .edge.hot{stroke:var(--gold);stroke-width:5;opacity:1;filter:drop-shadow(0 0 6px rgba(244,201,93,.6));stroke-dasharray:12 9;animation:flow 1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-42}}

  .node{position:absolute;width:126px;transform:translate(-50%,-50%);cursor:pointer;transition:opacity .2s}
  .node .card{
    position:relative;background:var(--glass);border:2px solid var(--el,#666);border-radius:15px;
    padding:9px 7px 8px;text-align:center;backdrop-filter:blur(6px);
    box-shadow:0 0 0 1px rgba(0,0,0,.25), 0 7px 18px rgba(0,0,0,.35), inset 0 0 20px -12px var(--el);
    transition:transform .12s ease, box-shadow .2s;
  }
  .node:hover .card{transform:translateY(-3px)}
  .node .avatar{
    width:56px;height:56px;margin:0 auto 4px;border-radius:50%;overflow:hidden;
    border:2px solid var(--el);background:#0c1c17;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 14px -4px var(--el);
  }
  .node .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .node .avatar .fallback{display:none;font-size:22px;font-weight:800;color:var(--el)}
  .node .avatar.noimg img{display:none}
  .node .avatar.noimg .fallback{display:flex}
  .node .nm{font-size:12.5px;font-weight:700;line-height:1.12;letter-spacing:.2px}
  .node .sub{font-size:10px;color:var(--muted);margin-top:1px}
  .node .lv{position:absolute;top:-8px;right:-8px;background:var(--el);color:#08130f;font-size:10.5px;font-weight:800;border-radius:8px;padding:2px 6px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .node .sec{position:absolute;top:-8px;left:-8px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:#08130f}
  .node .shape{position:absolute;bottom:5px;right:7px;font-size:10px;color:var(--muted)}
  .node .star{position:absolute;bottom:4px;left:7px;font-size:11px}

  .node.portal .card{border-color:var(--gold);box-shadow:0 0 0 1px rgba(0,0,0,.25),0 7px 22px rgba(0,0,0,.4),0 0 22px -6px var(--gold),inset 0 0 20px -12px var(--gold)}
  .node.portal .avatar{border-color:var(--gold);box-shadow:0 0 18px -3px var(--gold)}
  .node.exit .card{border:2px dashed var(--portal);background:linear-gradient(180deg,rgba(70,30,110,.5),rgba(40,20,70,.5));box-shadow:0 0 20px -6px var(--portal),inset 0 0 22px -12px var(--portal)}
  .node.exit .swirl{font-size:28px;filter:drop-shadow(0 0 8px var(--portal))}
  .node.exit .nm{color:#efe0ff}
  .node.exit .tag{font-size:9px;letter-spacing:1.1px;color:#caa9f0;text-transform:uppercase}

  .node.dim{opacity:.26;filter:grayscale(.4)}
  .node.sel .card{box-shadow:0 0 0 2px var(--gold),0 9px 26px rgba(0,0,0,.5),0 0 26px -6px var(--el)}
  .node.hot .card{box-shadow:0 0 0 2px var(--gold),0 0 24px -4px var(--gold)}
  .node .step{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#08130f;font-size:10.5px;font-weight:800;border-radius:50%;width:20px;height:20px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .node.hot .step{display:flex}

  /* ---- compact sidebar ---- */
  .side{overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:9px;padding-right:2px}
  .side::-webkit-scrollbar{width:7px}
  .side::-webkit-scrollbar-thumb{background:rgba(120,200,170,.2);border-radius:8px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px;backdrop-filter:blur(10px)}
  .panel h2{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:#bfd6cb}

  .finder .row{display:flex;gap:6px}
  .finder .fld{flex:1;display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
  .finder label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding-left:2px}
  select,button{font:inherit;color:var(--ink)}
  select{background:#0e211b;border:1px solid var(--line);border-radius:8px;padding:6px 7px;font-size:11.5px;width:100%;appearance:none;cursor:pointer}
  select:focus{outline:2px solid #2f7a5c}
  button{background:linear-gradient(180deg,#2f8f68,#1f6b4c);border:1px solid #3aa877;border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:600;font-size:12px;flex:1;box-shadow:0 3px 10px rgba(30,120,80,.3);transition:transform .08s,filter .15s}
  button:hover{filter:brightness(1.08)} button:active{transform:translateY(1px)}
  button.ghost{background:transparent;box-shadow:none;border-color:var(--line);color:var(--muted);font-weight:500;flex:0 0 auto;padding:7px 10px}

  .p-sub{color:var(--muted);font-size:11px;margin-bottom:6px}
  .steps{list-style:none;margin:6px 0 0;padding:0}
  .steps li{display:flex;gap:7px;align-items:center;padding:6px 8px;margin-bottom:4px;background:rgba(10,22,17,.6);border:1px solid var(--line);border-radius:8px;font-size:11.5px;line-height:1.25}
  .steps li .dir{flex:none;width:22px;height:22px;border-radius:6px;background:#123;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--gold);border:1px solid var(--line)}
  .steps .goal{background:linear-gradient(90deg,rgba(244,201,93,.16),transparent);border-color:rgba(244,201,93,.4)}
  .route-empty{color:var(--muted);font-size:11.5px;margin:0}
  .shorthand{font-size:11px;color:var(--muted);margin:7px 0 0}
  .shorthand b{color:var(--gold)}

  .detail .head{display:flex;gap:9px;align-items:center;margin-bottom:8px}
  .detail .head .av{width:46px;height:46px;border-radius:11px;overflow:hidden;border:2px solid var(--el);flex:none;background:#0c1c17;display:flex;align-items:center;justify-content:center}
  .detail .head .av img{width:100%;height:100%;object-fit:cover}
  .detail .head .av .fb{font-size:19px;font-weight:800;color:var(--el)}
  .detail .head h2{margin:0;font-size:14px;text-transform:none;letter-spacing:0}
  .chip{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;margin-top:3px}
  .detail .drow{display:flex;justify-content:space-between;gap:8px;font-size:11.5px;padding:4px 0;border-bottom:1px dashed var(--line)}
  .detail .drow:last-of-type{border-bottom:0}
  .detail .drow .k{color:var(--muted)}
  .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:8px 0 3px}
  .exits-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .exits-grid .ex{background:rgba(10,22,17,.55);border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-size:11px}
  .exits-grid .ex .d{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
  .exits-grid .ex.wall{opacity:.5} .exits-grid .ex.link{cursor:pointer}
  .exits-grid .ex.link:hover{border-color:var(--gold)}
  .card-note{margin-top:8px;background:linear-gradient(90deg,rgba(244,201,93,.08),transparent);border:1px solid rgba(244,201,93,.25);border-radius:8px;padding:7px 9px;font-size:11px}
  .card-note .cn-h{font-weight:700;color:var(--gold);margin-bottom:1px}
  .tierstar{color:var(--gold)}

  .legend{font-size:11px}
  .lgwrap{display:flex;flex-wrap:wrap;gap:5px 10px}
  .lg{display:flex;align-items:center;gap:5px;color:#cfe0d7;font-size:10.5px}
  .lg .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .lg .sq{width:14px;height:10px;border-radius:3px;flex:none}
  .foot{color:var(--muted);font-size:9.5px;margin-top:7px;line-height:1.4}

  @media (max-width:820px){
    body{overflow:auto;height:auto}
    .app{height:auto}
    .main{grid-template-columns:1fr}
    .mapzone{height:56vh}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🌲 Forest Labyrinth</h1>
    <span class="sub">Spirit Vale · route finder</span>
    <span class="spacer"></span>
    <span class="stat"><b id="st-rooms">–</b> rooms · <b id="st-exits">–</b> exits · <b>16/16</b> creatures</span>
  </header>

  <div class="main">
    <div class="mapzone" id="mapzone">
      <div id="stage"><svg class="edges" id="edges"></svg></div>
    </div>

    <aside class="side">
      <div class="panel finder">
        <h2>Route finder</h2>
        <div class="fld"><label for="from">From</label><select id="from"></select></div>
        <div class="fld"><label for="to">To</label><select id="to"></select></div>
        <div class="row"><button id="go">Find route</button><button id="clear" class="ghost">✕</button></div>
        <div id="route-sub" class="p-sub" style="margin:8px 0 0"></div>
        <div id="route-body"></div>
      </div>

      <div class="panel detail" id="detail" style="display:none"></div>

      <div class="panel legend">
        <h2>Legend</h2>
        <div class="lgwrap" id="lg-elements"></div>
        <div class="lgwrap" id="lg-sections" style="margin-top:6px"></div>
        <div class="lgwrap" style="margin-top:6px">
          <span class="lg"><span class="sq" style="background:var(--gold)"></span> Portal</span>
          <span class="lg"><span class="sq" style="background:linear-gradient(90deg,#7a3fb0,#c77dff);border:1px dashed #c77dff"></span> Exit</span>
        </div>
        <p class="foot">Schematic — not to scale. Use exit lists / route finder for true N·E·S·W. Click a room to inspect it.</p>
      </div>
    </aside>
  </div>
</div>

<script>
const DATA = /*__DATA__*/;
const N = DATA.nodes, EDGES = DATA.edges, EL = DATA.elementColors, SEC = DATA.sectionColors;
const DIRFULL = {n:'North', e:'East', s:'South', w:'West'};
const stage = document.getElementById('stage');
const svg = document.getElementById('edges');
const mapzone = document.getElementById('mapzone');
stage.style.width = DATA.canvasW+'px';
stage.style.height = DATA.canvasH+'px';
svg.setAttribute('width', DATA.canvasW); svg.setAttribute('height', DATA.canvasH);

// auto-fit the whole map into the viewport (no scrolling)
function fit(){
  const pad = 22;
  const k = Math.min((mapzone.clientWidth-pad)/DATA.canvasW, (mapzone.clientHeight-pad)/DATA.canvasH);
  stage.style.transform = `translate(-50%,-50%) scale(${k})`;
}
window.addEventListener('resize', fit);

document.getElementById('st-rooms').textContent = Object.values(N).filter(n=>n.kind==='room').length;
document.getElementById('st-exits').textContent = Object.values(N).filter(n=>n.kind==='exit').length;

const edgeEls = {};
for(const [a,b] of EDGES){
  const na=N[a], nb=N[b];
  const isExit = na.kind==='exit' || nb.kind==='exit';
  const p = document.createElementNS('http://www.w3.org/2000/svg','line');
  p.setAttribute('x1',na.x); p.setAttribute('y1',na.y);
  p.setAttribute('x2',nb.x); p.setAttribute('y2',nb.y);
  p.setAttribute('class','edge'+(isExit?' exit':''));
  svg.appendChild(p);
  edgeEls[a+'|'+b]=p; edgeEls[b+'|'+a]=p;
}

const nodeEls = {};
function elColor(n){ return n.kind==='exit' ? 'var(--portal)' : (EL[n.element]||'#888'); }
for(const id of Object.keys(N)){
  const n = N[id];
  const div = document.createElement('div');
  div.className = 'node '+n.kind + (n.portal?' portal':'');
  div.style.left = n.x+'px'; div.style.top = n.y+'px';
  div.style.setProperty('--el', elColor(n));
  if(n.kind==='exit'){
    div.innerHTML = `<div class="card">
      <div class="step"></div>
      <div class="avatar" style="border:none;box-shadow:none;background:none"><span class="swirl">🌀</span></div>
      <div class="tag">Exit ⇱</div>
      <div class="nm">${n.name}</div>
      <div class="sub">Lv.${n.levelRange}</div>
    </div>`;
  } else {
    const initial = (n.creature||n.name)[0];
    const img = n.img ? `<img src="${n.img}" alt="${n.creature}" onerror="this.closest('.avatar').classList.add('noimg')">` : '';
    const secBadge = n.section ? `<div class="sec" style="background:${SEC[n.section]}">${n.section}</div>` : '';
    const star = (n.card && n.card.tier) ? `<div class="star" title="High-value farm card">⭐</div>` : '';
    const shape = n.shape ? `<div class="shape" title="${n.shape}-shaped room">${n.shape}</div>` : '';
    const portalStar = n.portal ? '⭐ ' : '';
    div.innerHTML = `<div class="card">
      <div class="step"></div>
      <div class="lv">Lv.${n.level}</div>
      ${secBadge}
      <div class="avatar">${img}<span class="fallback">${initial}</span></div>
      <div class="nm">${portalStar}${n.name}</div>
      <div class="sub">${n.element}</div>
      ${star}${shape}
    </div>`;
  }
  div.addEventListener('click', ()=>select(id));
  div.addEventListener('mouseenter', ()=>hover(id,true));
  div.addEventListener('mouseleave', ()=>hover(id,false));
  stage.appendChild(div);
  nodeEls[id]=div;
}

// legends
const seen=new Set(); let lh='';
for(const n of Object.values(N)){ if(n.element && !seen.has(n.element)){ seen.add(n.element);
  lh += `<span class="lg"><span class="dot" style="background:${EL[n.element]}"></span>${n.element}</span>`; } }
document.getElementById('lg-elements').innerHTML = lh;
document.getElementById('lg-sections').innerHTML = [1,2,3,4].map(s=>
  `<span class="lg"><span class="dot" style="background:${SEC[s]}"></span>§${s}</span>`).join('');

const ADJ={};
for(const id of Object.keys(N)){ ADJ[id]=[];
  for(const [d,t] of Object.entries(N[id].exits)){ if(typeof t==='string') ADJ[id].push([d,t]); } }

const fromSel=document.getElementById('from'), toSel=document.getElementById('to');
function label(n){ return N[n].kind==='exit' ? '⇱ '+N[n].name : N[n].name + (N[n].section?` (§${N[n].section}·Lv${N[n].level})`:''); }
for(const id of DATA.order){ fromSel.add(new Option(label(id), id)); toSel.add(new Option(label(id), id)); }
fromSel.value='waypoint'; toSel.value='lightning_wisp';

let selected=null;
function clearClasses(){
  Object.values(nodeEls).forEach(e=>e.classList.remove('dim','hot','sel'));
  Object.values(edgeEls).forEach(e=>e.classList.remove('dim','hot'));
  Object.querySelectorAll('.node .step').forEach(s=>s.textContent='');
}
function hover(id,on){
  if(document.querySelector('.node.hot')) return;
  if(on){ const nbrs=new Set(ADJ[id].map(x=>x[1])); nbrs.add(id);
    Object.keys(N).forEach(k=>{ if(!nbrs.has(k)) nodeEls[k].classList.add('dim'); });
  } else { Object.values(nodeEls).forEach(e=>e.classList.remove('dim')); }
}
function select(id){ selected=id; clearClasses(); nodeEls[id].classList.add('sel'); renderDetail(id); }

function renderDetail(id){
  const n=N[id]; const d=document.getElementById('detail'); d.style.display='block';
  d.style.setProperty('--el', elColor(n));
  if(n.kind==='exit'){
    const back = Object.entries(n.exits).find(([k,v])=>typeof v==='string');
    d.innerHTML = `<div class="head"><div class="av" style="border-color:var(--portal)"><span class="fb" style="color:var(--portal)">🌀</span></div>
      <div><h2>${n.name}</h2><div class="p-sub" style="margin:0">Boundary exit · Lv.${n.levelRange}</div></div></div>
      <p style="font-size:11.5px;color:#cfe0d7;margin:0">Leaves the labyrinth to the overworld.${back?` Re-enter <b>${DIRFULL[back[0]]}</b> → <b>${N[back[1]].name}</b>.`:''}</p>`;
    return;
  }
  const img = n.img ? `<img src="${n.img}" onerror="this.closest('.av').innerHTML='<span class=\\'fb\\'>${(n.creature||n.name)[0]}</span>'">` : `<span class="fb">${(n.creature||n.name)[0]}</span>`;
  const exitCells = ['n','e','s','w'].map(dir=>{
    const t=n.exits[dir];
    if(typeof t==='string'){ return `<div class="ex link" data-go="${t}"><div class="d">${DIRFULL[dir]}</div><b>${N[t].name}</b></div>`; }
    if(t===false){ return `<div class="ex wall"><div class="d">${DIRFULL[dir]}</div>— wall —</div>`; }
    return `<div class="ex"><div class="d">${DIRFULL[dir]}</div><span style="color:var(--muted)">? unexplored</span></div>`;
  }).join('');
  const c=n.card||{};
  const tier = c.tier ? ` <span class="tierstar">⭐ ${c.tier}</span>` : '';
  d.innerHTML = `
    <div class="head">
      <div class="av">${img}</div>
      <div><h2>${n.portal?'⭐ ':''}${n.name}</h2>
        <div style="margin:0">
          <span class="chip" style="background:${EL[n.element]};color:#08130f">${n.element}</span>
          <span class="chip" style="background:rgba(255,255,255,.08);color:#cfe0d7">Lv.${n.level}</span>
          ${n.section?`<span class="chip" style="background:${SEC[n.section]};color:#08130f">§${n.section}</span>`:''}
        </div>
      </div>
    </div>
    <div class="drow"><span class="k">Creature</span><span>${n.creature}${n.density?` · <i>${n.density}</i>`:''}</span></div>
    ${n.shape?`<div class="drow"><span class="k">Room shape</span><span>${n.shape}-shaped</span></div>`:''}
    <div class="lbl">Exits</div>
    <div class="exits-grid">${exitCells}</div>
    ${c.name?`<div class="card-note"><div class="cn-h">🃏 ${c.name}${tier}</div><div>${c.effect} · <span style="color:var(--muted)">${c.slot} · 0.5%</span></div></div>`:''}`;
  d.querySelectorAll('.ex.link').forEach(e=>e.addEventListener('click',()=>select(e.dataset.go)));
}

function bfs(a,b){
  if(a===b) return [];
  const q=[a], prev={}; prev[a]=null;
  while(q.length){ const cur=q.shift();
    for(const [d,nx] of ADJ[cur]){
      if(!(nx in prev)){ prev[nx]=[cur,d];
        if(nx===b){ const steps=[]; let node=b;
          while(prev[node]){ const [p,dir]=prev[node]; steps.unshift([p,dir,node]); node=p; }
          return steps; }
        q.push(nx); } } }
  return null;
}
function findRoute(){
  const a=fromSel.value, b=toSel.value; clearClasses();
  const sub=document.getElementById('route-sub'), body=document.getElementById('route-body');
  if(a===b){ sub.textContent='Same room 🙂'; body.innerHTML='<p class="route-empty">Start = destination.</p>'; select(a); return; }
  const steps=bfs(a,b);
  if(!steps){ sub.textContent='No known path'; body.innerHTML='<p class="route-empty">Not connected by mapped exits yet.</p>'; return; }
  const path=[a, ...steps.map(s=>s[2])];
  Object.keys(N).forEach(k=>{ if(!path.includes(k)) nodeEls[k].classList.add('dim'); });
  Object.values(edgeEls).forEach(e=>e.classList.add('dim'));
  path.forEach((k,i)=>{ nodeEls[k].classList.add('hot'); const st=nodeEls[k].querySelector('.step'); if(st) st.textContent=i+1; });
  steps.forEach(([p,d,nx])=>{ const e=edgeEls[p+'|'+nx]; if(e){e.classList.remove('dim');e.classList.add('hot');} });
  sub.innerHTML = `<b>${N[a].name}</b> → <b>${N[b].name}</b> · ${steps.length} door${steps.length>1?'s':''}`;
  const shorthand = steps.map(s=>DIRFULL[s[1]][0]).join(' → ');
  let html = `<ul class="steps">`;
  steps.forEach(([p,d,nx],i)=>{
    const goal = i===steps.length-1;
    html += `<li class="${goal?'goal':''}"><span class="dir">${DIRFULL[d][0]}</span>
      <span>In <b>${N[p].name}</b>, go <b>${DIRFULL[d]}</b> → <b>${N[nx].name}</b>${N[nx].kind==='exit'?' 🌀':''}</span></li>`;
  });
  html += `</ul><p class="shorthand">Shorthand: <b>${shorthand}</b></p>`;
  body.innerHTML = html;
  renderDetail(b);
}
document.getElementById('go').addEventListener('click', findRoute);
document.getElementById('clear').addEventListener('click', ()=>{
  clearClasses(); selected=null;
  document.getElementById('route-sub').textContent='';
  document.getElementById('route-body').innerHTML='<p class="route-empty">Pick From/To, or click a room.</p>';
});

fit();
findRoute();
</script>
</body>
</html>
